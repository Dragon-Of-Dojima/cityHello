<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding - City Hello</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
  <div class="dashboard">
    <header class="dash-header">
      <div class="logo-sm">
        <span class="logo-icon">&#10070;</span>
        <span class="logo-text">City<span class="highlight">Hello</span></span>
      </div>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </header>

    <main class="dash-main">
      <!-- Onboarding chat overlay -->
      <div class="chat-overlay" id="chatOverlay">
        <div class="chat-container">
          <div class="chat-header">
            <div class="chat-avatar">E</div>
            <div>
              <strong>Emiri</strong>
              <p class="chat-subtitle">Your CityHello assistant</p>
            </div>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-area" id="chatInputArea"></div>
        </div>
      </div>

      <!-- Dashboard content (shown after onboarding) -->
      <div class="dash-content hidden" id="dashContent">
        <h2 id="welcomeHeading">Welcome!</h2>
        <p class="dash-subtitle">Your CityHello dashboard</p>
        <button class="ask-emiri-btn" id="askEmiriBtn">Ask Emiri!</button>
        <div id="interestSections"></div>
      </div>
    </main>
  </div>

  <script>
    const chatOverlay = document.getElementById('chatOverlay');
    const chatMessages = document.getElementById('chatMessages');
    const chatInputArea = document.getElementById('chatInputArea');
    const dashContent = document.getElementById('dashContent');
    const welcomeHeading = document.getElementById('welcomeHeading');

    // Play audio from server-generated URL
    function playAudio(url) {
      if (!url) return;
      const audio = new Audio(url);
      audio.play().catch(() => {});
    }

    function showTypingIndicator() {
      removeTypingIndicator();
      const typing = document.createElement('div');
      typing.className = 'chat-bubble bot typing-indicator';
      typing.id = 'typingIndicator';
      typing.innerHTML = '<span class="typing-text">Emiri is typing</span><span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>';
      chatMessages.appendChild(typing);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    function addBotMessage(text, audioUrl) {
      removeTypingIndicator();
      const msg = document.createElement('div');
      msg.className = 'chat-bubble bot';
      msg.textContent = text;
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      playAudio(audioUrl);
    }

    function addUserMessage(text) {
      const msg = document.createElement('div');
      msg.className = 'chat-bubble user';
      msg.textContent = text;
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function renderDashboardVenueCards(interest, venues, container) {
      const section = document.createElement('div');
      section.className = 'interest-section';

      const heading = document.createElement('h3');
      heading.className = 'interest-heading';
      heading.textContent = interest;
      section.appendChild(heading);

      const cardsWrap = document.createElement('div');
      cardsWrap.className = 'venue-cards';

      venues.forEach(v => {
        const card = document.createElement('div');
        card.className = 'venue-card';
        const name = v.name || 'Unknown';
        const category = v.category || '';
        const tags = v.tags || [];
        const linkUrl = v.url || ('https://www.google.com/maps/search/' + encodeURIComponent(name + ' ' + (v.address || '')));
        const imageHtml = v.image
          ? '<img class="venue-card-img" src="' + esc(v.image) + '" alt="' + esc(name) + '" />'
          : '<div class="venue-card-placeholder">' + esc(name.charAt(0)) + '</div>';
        const ratingHtml = v.rating ? '<span class="venue-card-rating">' + esc(String(v.rating)) + ' &#9733;</span>' : '';
        card.innerHTML =
          '<div class="venue-card-header">' +
            '<span class="venue-card-heart">&hearts;</span> ' +
            '<span>' + esc(v.recommendation || '') + '</span>' +
          '</div>' +
          '<div class="venue-card-body">' +
            '<div class="venue-card-image">' +
              imageHtml +
              '<span class="venue-card-type">' + esc(category.toUpperCase()) + '</span>' +
            '</div>' +
            '<div class="venue-card-info">' +
              '<h4>' + esc(name) + '</h4>' +
              '<div class="venue-card-tags">' + tags.map(t => '<span class="venue-tag">' + esc(t) + '</span>').join('') + ratingHtml + '</div>' +
              '<p class="venue-card-category">' + esc(category) + '</p>' +
              '<p class="venue-card-address">' + esc(v.address || '') + '</p>' +
              '<p class="venue-card-hours">' + esc(v.hours || '') + '</p>' +
              '<p class="venue-card-desc">' + esc(v.description || '') + '</p>' +
              '<a class="venue-card-more" href="' + esc(linkUrl) + '" target="_blank">More Info</a>' +
            '</div>' +
          '</div>';
        cardsWrap.appendChild(card);
      });

      section.appendChild(cardsWrap);
      container.appendChild(section);
    }

    async function loadInterestCards(interests) {
      const container = document.getElementById('interestSections');
      container.innerHTML = '<p class="dash-loading">Loading your personalized spots...</p>';

      const results = await Promise.all(
        interests.map(async (interest) => {
          try {
            const r = await fetch('/api/interests/venues?interest=' + encodeURIComponent(interest));
            const data = await r.json();
            return { interest, venues: data.venues || [] };
          } catch (e) {
            return { interest, venues: [] };
          }
        })
      );

      container.innerHTML = '';
      results.forEach(({ interest, venues }) => {
        if (venues.length > 0) {
          renderDashboardVenueCards(interest, venues, container);
        }
      });
    }

    function renderVenueCards(venues) {
      const container = document.createElement('div');
      container.className = 'venue-cards';

      venues.forEach(v => {
        const card = document.createElement('div');
        card.className = 'venue-card';
        const linkUrl = v.url || ('https://www.google.com/maps/search/' + encodeURIComponent(v.name + ' ' + v.address));
        const imageHtml = v.image
          ? '<img class="venue-card-img" src="' + esc(v.image) + '" alt="' + esc(v.name) + '" />'
          : '<div class="venue-card-placeholder">' + esc(v.name.charAt(0)) + '</div>';
        const ratingHtml = v.rating ? '<span class="venue-card-rating">' + esc(String(v.rating)) + ' &#9733;</span>' : '';
        card.innerHTML =
          '<div class="venue-card-header">' +
            '<span class="venue-card-heart">&hearts;</span> ' +
            '<span>' + esc(v.recommendation) + '</span>' +
          '</div>' +
          '<div class="venue-card-body">' +
            '<div class="venue-card-image">' +
              imageHtml +
              '<span class="venue-card-type">' + esc(v.category.toUpperCase()) + '</span>' +
            '</div>' +
            '<div class="venue-card-info">' +
              '<h4>' + esc(v.name) + '</h4>' +
              '<div class="venue-card-tags">' + v.tags.map(t => '<span class="venue-tag">' + esc(t) + '</span>').join('') + ratingHtml + '</div>' +
              '<p class="venue-card-category">' + esc(v.category) + '</p>' +
              '<p class="venue-card-address">' + esc(v.address) + '</p>' +
              '<p class="venue-card-hours">' + esc(v.hours) + '</p>' +
              '<p class="venue-card-desc">' + esc(v.description) + '</p>' +
              '<a class="venue-card-more" href="' + esc(linkUrl) + '" target="_blank">More Info</a>' +
            '</div>' +
          '</div>';
        container.appendChild(card);
      });

      chatMessages.appendChild(container);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function handleChatResponse(data) {
      addBotMessage(data.reply, data.audioUrl);

      if (data.complete) {
        chatInputArea.innerHTML = '';
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 3000);
      } else if (data.showConfirm && data.venues) {
        renderVenueCards(data.venues);
        showConfirmButtons();
      } else {
        showTextInput();
      }
    }

    function showConfirmButtons() {
      chatInputArea.innerHTML = '';
      const wrapper = document.createElement('div');
      wrapper.className = 'confirm-buttons';

      const yesBtn = document.createElement('button');
      yesBtn.className = 'confirm-btn confirm-yes';
      yesBtn.textContent = "Yes, that's what I meant";

      const noBtn = document.createElement('button');
      noBtn.className = 'confirm-btn confirm-no';
      noBtn.textContent = 'No';

      async function handleConfirm(text) {
        yesBtn.disabled = true;
        noBtn.disabled = true;
        addUserMessage(text);
        showTypingIndicator();

        const res = await fetch('/api/onboarding/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        setTimeout(() => handleChatResponse(data), 400);
      }

      yesBtn.addEventListener('click', () => handleConfirm("Yes, that's what I meant"));
      noBtn.addEventListener('click', () => handleConfirm('No'));

      wrapper.appendChild(yesBtn);
      wrapper.appendChild(noBtn);
      chatInputArea.appendChild(wrapper);
    }

    function showTextInput() {
      chatInputArea.innerHTML = '';
      const wrapper = document.createElement('div');
      wrapper.className = 'chat-input-wrapper';

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'chat-text-input';
      input.placeholder = 'Type your answer...';

      const sendBtn = document.createElement('button');
      sendBtn.className = 'chat-send-btn';
      sendBtn.textContent = 'Send';

      async function submit() {
        const val = input.value.trim();
        if (!val) return;

        // Disable input while processing
        input.disabled = true;
        sendBtn.disabled = true;
        sendBtn.textContent = '...';

        addUserMessage(val);
        showTypingIndicator();

        const res = await fetch('/api/onboarding/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: val }),
        });
        const data = await res.json();

        setTimeout(() => handleChatResponse(data), 400);
      }

      sendBtn.addEventListener('click', submit);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submit();
      });

      wrapper.appendChild(input);
      wrapper.appendChild(sendBtn);
      chatInputArea.appendChild(wrapper);
      input.focus();
    }

    async function init() {
      const meRes = await fetch('/api/me');
      const user = await meRes.json();
      welcomeHeading.textContent = 'Welcome, ' + user.firstName + '!';

      if (user.onboardingComplete) {
        chatOverlay.remove();
        dashContent.classList.remove('hidden');
        const interests = user.onboardingData && user.onboardingData.interests
          ? user.onboardingData.interests.extracted
          : [];
        if (interests.length > 0) {
          loadInterestCards(interests);
        }
        return;
      }

      // Get initial Emiri message from server
      showTypingIndicator();
      const startRes = await fetch('/api/onboarding/start');
      const startData = await startRes.json();

      if (startData.complete) {
        chatOverlay.classList.add('hidden');
        dashContent.classList.remove('hidden');
        return;
      }

      addBotMessage(startData.message, startData.audioUrl);
      showTextInput();
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/';
    });

    init();
  </script>
</body>
</html>
